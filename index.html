<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocKalodski Apps</title>
  <style>
    :root {
      --bg: #0c1445; --card: #1a2875; --card2: #ffffff;
      --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0c1445 0%, #1a2875 50%, #0e3a6e 100%);
      min-height: 100vh; color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 16px 60px;
    }
    header { text-align: center; margin-bottom: 48px; }
    .logo { font-size: 2.8rem; font-weight: 900; letter-spacing: -1px; }
    .logo span { color: var(--accent); }
    .tagline { font-size: 0.9rem; color: var(--muted); margin-top: 6px; letter-spacing: 1px; text-transform: uppercase; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px; width: 100%; max-width: 900px;
    }
    .app-card {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: var(--radius);
      padding: 28px 24px;
      text-decoration: none; color: inherit;
      transition: transform 0.18s, background 0.18s;
      display: flex; flex-direction: column; gap: 10px;
    }
    .app-card:hover { transform: translateY(-4px); background: rgba(255,255,255,0.13); }
    .app-icon { font-size: 2.4rem; }
    .app-name { font-size: 1.25rem; font-weight: 800; }
    .app-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.55; }
    .app-tag {
      display: inline-block; background: rgba(56,189,248,0.15);
      color: var(--accent); border-radius: 20px;
      padding: 3px 12px; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.5px; margin-top: 4px; width: fit-content;
    }

    footer { margin-top: 56px; font-size: 0.72rem; color: rgba(255,255,255,0.3); text-align: center; }
  </style>
</head>
<body>

<header>
  <div class="logo">Doc<span>Kalodski</span></div>
  <div class="tagline">Personal Apps &amp; Tools</div>
</header>

<div class="grid">

  <a class="app-card" href="/raycoradar/">
    <div class="app-icon">📡</div>
    <div class="app-name">RaycoRadar</div>
    <div class="app-desc">Blood pressure monitor for seniors. Logs readings, tracks 7-day trends, and flags critical time slots. Senior-friendly with large text and dark mode.</div>
    <div class="app-tag">Health · BP Monitor</div>
  </a>

  <!-- Future apps go here -->

</div>

<footer>DocKalodski · Built with ❤️ by Doc Kalodski</footer>

</body>
</html>
